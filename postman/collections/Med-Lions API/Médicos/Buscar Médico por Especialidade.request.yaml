$kind: http-request
name: 'Buscar Médico por Especialidade'
method: GET
url: '{{baseUrl}}/medicos'
order: 3000
queryParams:
  - key: especialidade
    value: Cardiologia
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Retorna array", () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test("Resultados contêm a especialidade buscada", () => {
          pm.response.json().forEach(m => {
              pm.expect(m.especialidade.toLowerCase()).to.include('cardiologia');
          });
      });
