$kind: http-request
name: 'Buscar Médico por Nome'
method: GET
url: '{{baseUrl}}/medicos'
order: 2000
queryParams:
  - key: nome
    value: Carlos
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Retorna array", () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test("Resultados contêm o nome buscado", () => {
          pm.response.json().forEach(m => {
              pm.expect(m.nome.toLowerCase()).to.include('carlos');
          });
      });
