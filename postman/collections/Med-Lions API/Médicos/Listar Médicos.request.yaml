$kind: http-request
name: 'Listar Médicos'
method: GET
url: '{{baseUrl}}/medicos'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Resposta é um array", () => {
          const json = pm.response.json();
          pm.expect(json).to.be.an('array');
      });
      pm.test("Cada médico tem id, nome e especialidade", () => {
          const json = pm.response.json();
          json.forEach(m => {
              pm.expect(m).to.have.property('id');
              pm.expect(m).to.have.property('nome');
              pm.expect(m).to.have.property('especialidade');
          });
      });
