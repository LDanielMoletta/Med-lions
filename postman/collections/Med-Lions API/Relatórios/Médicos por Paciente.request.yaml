$kind: http-request
name: 'Médicos por Paciente'
method: GET
url: '{{baseUrl}}/relatorios/medicos-paciente/1'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Retorna array de médicos", () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test("Cada médico tem id, nome e especialidade", () => {
          pm.response.json().forEach(m => {
              pm.expect(m).to.have.property('id');
              pm.expect(m).to.have.property('nome');
              pm.expect(m).to.have.property('especialidade');
          });
      });
