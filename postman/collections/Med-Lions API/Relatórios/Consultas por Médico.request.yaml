$kind: http-request
name: 'Consultas por Médico'
method: GET
url: '{{baseUrl}}/relatorios/consultas-medico/1'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Retorna array de consultas", () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test("Todas as consultas são do médico solicitado", () => {
          pm.response.json().forEach(c => {
              pm.expect(c.idMedico).to.eql(1);
          });
      });
