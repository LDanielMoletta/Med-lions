$kind: http-request
name: 'Consultas por Mês'
method: GET
url: '{{baseUrl}}/relatorios/consultas-mes'
order: 4000
queryParams:
  - key: mes
    value: '2026-06'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Retorna array de consultas", () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test("Todas as consultas são do mês solicitado", () => {
          pm.response.json().forEach(c => {
              pm.expect(c.data).to.include('2026-06');
          });
      });
