$kind: http-request
name: 'Cancelar Consulta'
method: DELETE
url: '{{baseUrl}}/consultas/1'
order: 5000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Mensagem de cancelamento retornada", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property('mensagem');
          pm.expect(json.mensagem).to.include('cancelada');
      });
