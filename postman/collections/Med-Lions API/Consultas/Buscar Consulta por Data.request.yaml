$kind: http-request
name: 'Buscar Consulta por Data'
method: GET
url: '{{baseUrl}}/consultas'
order: 2000
queryParams:
  - key: data
    value: '2026-06'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Retorna array", () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test("Resultados contêm a data buscada", () => {
          pm.response.json().forEach(c => {
              pm.expect(c.data).to.include('2026-06');
          });
      });
